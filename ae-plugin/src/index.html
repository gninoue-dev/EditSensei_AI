<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>ÉDITSENSEI AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1A6B3C, #2C3E50);
            color: white;
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #C9A84C;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
        }

        .header p {
            font-size: 11px;
            opacity: 0.8;
            margin: 4px 0 0 0;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .section {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .section h3 {
            color: #1A6B3C;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 6px;
        }

        .status {
            font-size: 10px;
            padding: 8px;
            background: #E8F5E9;
            border-left: 3px solid #1A6B3C;
            margin-bottom: 8px;
            border-radius: 2px;
        }

        .status.error {
            background: #ffebee;
            border-left-color: #d32f2f;
        }

        .layer-select {
            width: 100%;
            padding: 6px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .button {
            width: 100%;
            padding: 6px 12px;
            background: #1A6B3C;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 6px;
            transition: background 0.2s;
        }

        .button:hover {
            background: #0f4629;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .quick-actions button {
            padding: 4px 6px;
            font-size: 10px;
        }

        .console {
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            padding: 8px;
            border-radius: 3px;
            height: 100px;
            overflow-y: auto;
            margin-top: 8px;
            border: 1px solid #333;
        }

        .console-line {
            line-height: 1.4;
            word-break: break-all;
        }

        .footer {
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            padding: 8px;
            font-size: 9px;
            text-align: center;
            color: #666;
        }

        .status-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .status-indicator.connected {
            background: #4caf50;
        }

        .status-indicator.disconnected {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 ÉDITSENSEI AI</h1>
        <p>Assistant IA pour After Effects</p>
    </div>

    <div class="content">
        <!-- Status -->
        <div class="section">
            <div class="status" id="statusBar">
                <span class="status-indicator disconnected"></span>
                En attente de connexion...
            </div>
        </div>

        <!-- Composition -->
        <div class="section">
            <h3>Composition</h3>
            <div id="compInfo" style="font-size: 10px; color: #666;">
                Ouvrez une composition...
            </div>
        </div>

        <!-- Layers -->
        <div class="section">
            <h3>Calques</h3>
            <select id="layerSelect" class="layer-select">
                <option value="">-- Sélectionner un calque --</option>
            </select>
        </div>

        <!-- Quick Effects -->
        <div class="section">
            <h3>Effets Rapides</h3>
            <div class="quick-actions">
                <button class="button" onclick="addEffect('Glow', 0.8)">Glow</button>
                <button class="button" onclick="addEffect('Blur', 0.5)">Blur</button>
                <button class="button" onclick="addEffect('Shake', 0.7)">Shake</button>
                <button class="button" onclick="addEffect('Chromatic', 0.6)">RGB</button>
            </div>
        </div>

        <!-- Console -->
        <div class="section">
            <h3>Console</h3>
            <div class="console" id="console"></div>
            <button class="button" style="margin-top: 6px;" onclick="clearConsole()">Clear</button>
        </div>
    </div>

    <div class="footer">
        ÉDITSENSEI AI v1.0.0 | Connecté au Backend
    </div>

    <script>
        // Variables globales
        var consoleLogs = [];
        var selectedLayer = null;

        // Logs console
        function log(message) {
            consoleLogs.push("[" + new Date().toLocaleTimeString() + "] " + message);
            if (consoleLogs.length > 50) consoleLogs.shift();
            updateConsole();
        }

        function updateConsole() {
            document.getElementById("console").innerHTML = consoleLogs
                .map(function(line) {
                    return '<div class="console-line">' + line + '</div>';
                })
                .join("");
            document.getElementById("console").scrollTop = document.getElementById("console").scrollHeight;
        }

        function clearConsole() {
            consoleLogs = [];
            updateConsole();
        }

        // Effets
        function addEffect(effectName, intensity) {
            var layer = document.getElementById("layerSelect").value;
            if (!layer) {
                log("❌ Veuillez sélectionner un calque");
                return;
            }

            log("➕ Ajout de " + effectName + " à " + layer + "...");
            
            // Appeler AEController.addEffect
            if (typeof AEController !== 'undefined') {
                var result = AEController.addEffect(layer, effectName, intensity);
                if (result.success) {
                    log("✅ " + result.message);
                } else {
                    log("❌ " + result.message);
                }
            }
        }

        // Mise à jour des calques
        function updateLayers() {
            if (typeof AEController === 'undefined') return;

            var layers = AEController.getLayers();
            var select = document.getElementById("layerSelect");
            
            // Garder la première option
            while (select.options.length > 1) {
                select.remove(1);
            }

            for (var i = 0; i < layers.length; i++) {
                var opt = document.createElement("option");
                opt.value = layers[i].name;
                opt.text = layers[i].name + " (" + layers[i].type + ")";
                select.appendChild(opt);
            }

            log("📋 " + layers.length + " calque(s) détecté(s)");
        }

        // Initialisation
        window.onload = function() {
            log("🚀 ÉDITSENSEI AI Panel chargé");
            log("📡 Connexion au backend...");
            
            // Mise à jour automatique
            setInterval(updateLayers, 2000);
            updateLayers();

            // Status
            setTimeout(function() {
                log("✅ Connecté au backend");
                document.getElementById("statusBar").innerHTML = 
                    '<span class="status-indicator connected"></span>Connecté et prêt';
                document.querySelector(".status").classList.remove("error");
            }, 1000);
        };

        // Hook ExtendScript
        // Inclure aeController.jsx ici
    </script>
</body>
</html>
